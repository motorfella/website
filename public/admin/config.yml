local_backend: true

backend:
  name: github
  repo: REPLACE_WITH_GITHUB_OWNER/motorfella
  branch: master

media_folder: "public/images/uploads"
public_folder: "/images/uploads"

collections:
  - name: "settings"
    label: "Settings"
    files:
      - name: "site"
        label: "Site Settings"
        file: "src/data/site.json"
        fields:
          - { label: "Site Name", name: "site_name", widget: "string" }
          - { label: "Site Description", name: "site_description", widget: "text" }
          - { label: "Location", name: "location", widget: "string" }
          - { label: "Logo", name: "logo", widget: "image", required: false }
          - { label: "WhatsApp Group URL", name: "whatsapp_group_url", widget: "string" }
          - { label: "Formspree Endpoint", name: "formspree_endpoint", widget: "string" }
          - { label: "Default Placeholder Image", name: "placeholder_image", widget: "image", required: false }
          - label: "Social Links"
            name: "social_links"
            widget: "list"
            fields:
              - { label: "Label", name: "label", widget: "string" }
              - { label: "URL", name: "href", widget: "string" }
              - { label: "Handle", name: "handle", widget: "string" }
              - { label: "Short Label", name: "abbr", widget: "string" }

      - name: "gallery"
        label: "Gallery"
        file: "src/data/gallery.json"
        fields:
          - { label: "Page Title", name: "title", widget: "string" }
          - { label: "Meta Description", name: "description", widget: "text" }
          - { label: "Intro Text", name: "intro", widget: "string" }
          - { label: "Share CTA Text", name: "share_cta_text", widget: "string" }
          - { label: "Share CTA Label", name: "share_cta_label", widget: "string" }
          - label: "Categories"
            name: "categories"
            widget: "list"
            field: { label: "Category", name: "category", widget: "string" }
          - label: "Images"
            name: "images"
            widget: "list"
            fields:
              - { label: "Image", name: "src", widget: "image" }
              - { label: "Alt Text", name: "alt", widget: "string" }
              - { label: "Category", name: "category", widget: "select", options: ["rides", "events", "routes", "people"] }

  - name: "routes"
    label: "Routes"
    folder: "src/content/routes"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Distance KM", name: "distance_km", widget: "number", value_type: "int" }
      - { label: "Duration Days", name: "duration_days", widget: "number", value_type: "int" }
      - { label: "Region", name: "region", widget: "string" }
      - { label: "Difficulty", name: "difficulty", widget: "select", options: ["easy", "moderate", "challenging", "epic"] }
      - { label: "Type", name: "type", widget: "string" }
      - { label: "Hero Image", name: "hero_image", widget: "image", required: false }
      - { label: "Key Stops", name: "key_stops", widget: "list", field: { label: "Stop", name: "stop", widget: "string" } }
      - { label: "Tips", name: "tips", widget: "list", field: { label: "Tip", name: "tip", widget: "string" } }
      - label: "Checkpoints (Map)"
        name: "checkpoints"
        widget: "list"
        required: false
        hint: "Add checkpoints for the animated route map. Use /admin/map to build these visually."
        fields:
          - { label: "Place Name", name: "name", widget: "string" }
          - { label: "Latitude", name: "lat", widget: "number", value_type: "float" }
          - { label: "Longitude", name: "lng", widget: "number", value_type: "float" }
          - { label: "Note (optional)", name: "note", widget: "text", required: false }
      - { label: "Body", name: "body", widget: "markdown" }

  - name: "events"
    label: "Events"
    folder: "src/content/events"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Date", name: "date", widget: "date", format: "YYYY-MM-DD" }
      - { label: "End Date", name: "end_date", widget: "date", format: "YYYY-MM-DD", required: false }
      - { label: "Location", name: "location", widget: "string" }
      - { label: "Meeting Point", name: "meeting_point", widget: "string" }
      - { label: "Departure Time", name: "departure_time", widget: "string" }
      - { label: "Distance KM", name: "distance_km", widget: "number", value_type: "int" }
      - { label: "Status", name: "status", widget: "select", options: ["upcoming", "past"] }
      - { label: "Hero Image", name: "hero_image", widget: "image", required: false }
      - { label: "WhatsApp Link", name: "whatsapp_link", widget: "string", required: false }
      - { label: "Recap Slug", name: "recap_slug", widget: "string", required: false }
      - { label: "Body", name: "body", widget: "markdown" }

  - name: "stories"
    label: "Stories and Videos"
    folder: "src/content/stories"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Author", name: "author", widget: "string", required: false }
      - { label: "Date", name: "date", widget: "date", format: "YYYY-MM-DD" }
      - { label: "Type", name: "type", widget: "select", options: ["story", "video"] }
      - { label: "Excerpt", name: "excerpt", widget: "text" }
      - { label: "Hero Image", name: "hero_image", widget: "image", required: false }
      - { label: "YouTube URL", name: "youtube_url", widget: "string", required: false }
      - { label: "Featured", name: "featured", widget: "boolean", default: false }
      - { label: "Body", name: "body", widget: "markdown" }
